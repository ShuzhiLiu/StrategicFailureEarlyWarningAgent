name: New company case
description: Suggest a company / strategy theme to run the pipeline against.
labels: ["case-request"]
body:
  - type: input
    id: company
    attributes:
      label: Company (legal name)
      placeholder: "Tesla, Inc."
    validations:
      required: true

  - type: input
    id: strategy
    attributes:
      label: Strategy theme
      description: A specific strategic bet, not "their overall strategy".
      placeholder: "Robotaxi commercialization"
    validations:
      required: true

  - type: input
    id: cutoff
    attributes:
      label: Proposed cutoff date
      description: A date before the strategic outcome (success or failure) becomes public.
      placeholder: "2024-08-01"
    validations:
      required: true

  - type: textarea
    id: why-interesting
    attributes:
      label: Why this case is interesting
      description: What makes this a meaningful test of the pipeline? Is it a hypothesized failure, a control, or an ambiguous case?
    validations:
      required: true

  - type: textarea
    id: ground-truth
    attributes:
      label: Known post-cutoff events (optional)
      description: For retrospective cases with known outcomes — list 2-4 events with dates for backtest.
    validations:
      required: false
