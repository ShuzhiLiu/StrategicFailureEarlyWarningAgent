# Truth file for Honda EV retrospective case (cutoff 2025-05-19).
# EVALUATION-ONLY — never loaded by retrieval, extraction, analyst,
# adversarial, or synthesis code. Read by sfewa.agents.backtest only.

case_id: "honda_ev_2025"

# Sentinel: unique string used by tests/test_integration/test_label_leakage.py
# to verify no truth content reaches agent-visible prompts. Must be:
#   - unique to this truth file
#   - present nowhere else in the repo
#   - distinctive enough that LLM output containing it would clearly indicate
#     leakage rather than coincidence
sentinel: "__TRUTH_SENTINEL_honda_ev_2025_b91c3d__"

known_outcome: >
  Honda revised its 2030 EV/FCEV sales-ratio target downward and cut its
  EV+software investment commitment, then cancelled multiple North American
  EV programs and recorded a multi-hundred-billion-yen writedown.
outcome_disclosed_at: "2025-05-20"
validation_notes: >
  Honda's reset was not a single event but a cascade: target revision (May
  2025) → North American EV cancellation + writedown (March 2026) → Sony
  Honda Mobility restructuring (March 2026). A successful prediction should
  flag the strategy as HIGH/CRITICAL risk before the May 2025 revision; the
  March 2026 cancellation is a secondary confirmation.

ground_truth_events:
  - event_id: "gt_001"
    event_date: "2025-05-20"
    description: >
      Honda revises 2030 EV/FCEV sales ratio target from ~30% to ~20%.
      Cuts EV and software investment from 10 trillion to 7 trillion yen.
      Emphasizes HEV as primary transition vehicle.
    event_type: "target_revision"
    source_url: "https://global.honda/en/newsroom/news/2025/c250520eng.html"
    key_figures:
      - metric: "2030 EV sales ratio"
        old_value: "~30%"
        new_value: "~20%"
      - metric: "EV/software investment"
        old_value: "10 trillion yen"
        new_value: "7 trillion yen"

  - event_id: "gt_002"
    event_date: "2026-03-12"
    description: >
      Honda cancels multiple North American EV models (0 SUV, 0 Saloon,
      Acura RSX). Records 820 billion to 1.12 trillion yen operating expense
      for EV strategy reassessment. Total losses including equity method
      investment losses up to 2.5 trillion yen.
    event_type: "project_cancellation"
    source_url: "https://global.honda/en/investors/library/filings/auto_20260312580604/pdfFile.pdf"
    key_figures:
      - metric: "Operating expense"
        value: "820B - 1.12T yen"
      - metric: "Total loss (incl equity method)"
        value: "up to 2.5T yen"

  - event_id: "gt_003"
    event_date: "2026-03-25"
    description: >
      Sony Honda Mobility (Afeela) project effectively cancelled or
      significantly restructured.
    event_type: "project_cancellation"
