case_id: "ping_an_2024"
sentinel: "__TRUTH_SENTINEL_ping_an_2024_a3f1c8__"

known_outcome: >
  Through 2024-2025, Ping An's integrated finance + technology platform
  strategy showed strain at multiple seams: the technology segment (Lufax,
  PingAn Healthcare/HealthKonnect) underperformed expectations, P&C
  insurance margins compressed under auto-insurance loss-ratio pressure,
  and real-estate exposure (legacy investments) continued to drag book
  value. The pre-cutoff filings carried explicit risk disclosures around
  each of these areas.

# When the outcome became publicly disclosed in a way that retrospective
# evaluation can anchor on. 2025-03-21 is Ping An's 2024 annual-results
# announcement window (typical timing).
outcome_disclosed_at: "2025-03-21"

validation_notes: >
  Selection rationale (per roadmap rev 4 four-criteria test):

    1. Outcome has clear public disclosure date — YES, 2024 annual results
       publication anchors the strategic-failure narrative.
    2. Pre-cutoff HKEX filings contain enough signal — YES, 2023 annual
       report + 2024 interim already disclose tech-segment headwinds and
       auto-insurance loss-ratio pressure.
    3. Outcome is a strategic event, not pure stock-price noise — YES,
       the technology-platform strategy was the declared moat; its
       underperformance is a strategic question, not a market timing one.
    4. Agent does not need external news to understand the primary risk —
       YES, HKEX disclosures are sufficient.

