# Model Configuration
# Single model: Qwen3.5-27B-GPTQ-Int4 on vLLM
# Two modes (NOT two models):
#   - thinking:     enable_thinking=True, CoT reasoning before answer
#   - non_thinking: enable_thinking=False, direct answer (faster)

model:
  name: "Qwen/Qwen3.5-27B-GPTQ-Int4"
  provider: "vllm"
  base_url_env: "DEFAULT_BASE_URL"

# Role -> mode mapping
role_modes:
  retrieval: "non_thinking"
  extraction: "non_thinking"
  industry_analyst: "non_thinking"
  company_analyst: "non_thinking"
  peer_analyst: "non_thinking"
  backtest: "non_thinking"
  adversarial: "thinking"
  synthesis: "thinking"

# Sampling params per Qwen3.5 recommendations
sampling:
  thinking:
    temperature: 1.0
    top_p: 0.95
    max_tokens: 81920
  non_thinking:
    temperature: 0.5
    top_p: 0.8
    max_tokens: 32768

# vLLM server launch command reference:
# vllm serve Qwen/Qwen3.5-27B-GPTQ-Int4 \
#   --port 8000 \
#   --enable-auto-tool-choice \
#   --tool-call-parser qwen3_coder \
#   --reasoning-parser qwen3 \
#   --quantization gptq

# Tool calling: Qwen3.5 supports native function calling via OpenAI tools API.
# The --enable-auto-tool-choice and --tool-call-parser flags are required.
# Tool calling works in both thinking and non-thinking modes.
